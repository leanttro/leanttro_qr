<!DOCTYPE html>
<html lang="pt-BR">
<head>

<style>
  :root {
    --azul-1: #0f1b3d;
    --azul-2: #16214a;
    --azul-3: #0a1330;
    --dourado: #d4af37;
    --dourado-claro: #f3d98b;
    --dourado-escuro: #9c7a22;
    --texto-suave: #c7cde0;
  }

  * { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; min-height: 100%; }

  body {
    font-family: 'Montserrat', {{ font_css }}, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 16px;
    position: relative;
    overflow-x: hidden;
    background:
      radial-gradient(circle at 20% 10%, rgba(212, 175, 55, 0.10) 0%, transparent 42%),
      radial-gradient(circle at 85% 90%, rgba(212, 175, 55, 0.08) 0%, transparent 45%),
      radial-gradient(circle at 50% 50%, var(--azul-2) 0%, var(--azul-1) 55%, var(--azul-3) 100%);
    background-attachment: fixed;
  }

  /* padrão geométrico discreto de fundo */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.35;
    background-image:
      repeating-linear-gradient(45deg, rgba(212, 175, 55, 0.035) 0px, rgba(212, 175, 55, 0.035) 1px, transparent 1px, transparent 26px),
      repeating-linear-gradient(-45deg, rgba(212, 175, 55, 0.035) 0px, rgba(212, 175, 55, 0.035) 1px, transparent 1px, transparent 26px);
    z-index: 0;
  }

  .wrapper {
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 1;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card {
    width: 100%;
    background: linear-gradient(160deg, rgba(22, 33, 74, 0.92) 0%, rgba(10, 19, 48, 0.96) 100%);
    border: 1px solid rgba(212, 175, 55, 0.35);
    border-radius: 22px;
    padding: 44px 30px 34px;
    box-shadow:
      0 25px 60px rgba(0, 0, 0, 0.55),
      0 0 0 1px rgba(212, 175, 55, 0.06) inset;
    text-align: center;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, var(--dourado), var(--dourado-claro), var(--dourado), transparent);
  }

  /* ===== Bigode decorativo 3D ===== */
  .bigode-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 22px;
    filter: drop-shadow(0 10px 14px rgba(0, 0, 0, 0.5));
  }

  .bigode-wrap svg { width: 148px; height: auto; }

  .titulo {
    font-size: calc({{ font_size_val }}px + 12px);
    font-weight: 800;
    letter-spacing: -0.01em;
    margin: 0 0 6px;
    line-height: 1.2;
    background: linear-gradient(180deg, var(--dourado-claro) 0%, var(--dourado) 55%, var(--dourado-escuro) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .subtitulo {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--texto-suave);
    margin: 0 0 22px;
  }

  .divisor {
    width: 64px;
    height: 2px;
    margin: 0 auto 24px;
    background: linear-gradient(90deg, transparent, var(--dourado), transparent);
  }

  .mensagem {
    font-size: {{ font_size_val }}px;
    font-weight: 400;
    line-height: 1.8;
    color: var(--texto-suave);
    white-space: pre-line;
    margin: 0;
    word-wrap: break-word;
  }

  .rodape { margin-top: 26px; text-align: center; }

  .rodape a {
    color: rgba(212, 175, 55, 0.75);
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: color 0.2s ease;
  }

  .rodape a:hover { color: var(--dourado-claro); text-decoration: underline; }

  @media (max-width: 380px) {
    .card { padding: 36px 22px 28px; border-radius: 18px; }
    .titulo { font-size: calc({{ font_size_val }}px + 8px); }
    .bigode-wrap svg { width: 120px; }
  }
</style>
</head>
<body>

    <div class="card">

      <p class="subtitulo">Feliz Dia dos Pais</p>

    </div>

    <div class="rodape">
      <a href="https://qrcodebrindes.com.br" target="_blank" rel="noopener">Feito com QR Code Brindes &copy; {{ current_year }}</a>
