{% extends "fidelize/_base.html" %}

{% block titulo %}Esqueci minha senha — Fidelize{% endblock %}

{% block conteudo %}
<div class="form-wrap">
    <div class="form-card">
        <h1>Esqueceu a senha?</h1>
        <p class="sub">Digite o e-mail da sua conta. Vamos te mandar uma senha nova.</p>

        <form method="POST" action="/esqueci-senha">
            <div class="form-field">
                <label for="email">E-mail</label>
                <input class="form-input" type="email" id="email" name="email" required autocomplete="email">
            </div>
            <button class="btn-form" type="submit">Enviar nova senha</button>
        </form>

        <div class="form-footer-link">
            Lembrou a senha? <a href="/login">Voltar pro login</a>
        </div>
    </div>
</div>
{% endblock %}
