{% extends "fidelize/_base.html" %}

{% block titulo %}Entrar — Fidelize{% endblock %}

{% block conteudo %}
<div class="form-wrap">
    <div class="form-card">
        <h1>Entrar</h1>
        <p class="sub">Acesse o painel da sua conta de fidelidade.</p>

        {% if erro %}
            <div class="flash flash-error">{{ erro }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-field">
                <label for="email">E-mail</label>
                <input class="form-input" type="email" id="email" name="email" required autocomplete="email">
            </div>
            <div class="form-field">
                <label for="senha">Senha</label>
                <input class="form-input" type="password" id="senha" name="senha" required autocomplete="current-password">
            </div>
            <button class="btn-form" type="submit">Entrar</button>
        </form>

        <div class="form-footer-link">
            Ainda não tem conta? <a href="/cadastro">Criar conta grátis</a>
        </div>
    </div>
</div>
{% endblock %}
