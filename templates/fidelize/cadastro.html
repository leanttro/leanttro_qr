{% extends "fidelize/_base.html" %}

{% block titulo %}Criar conta grátis — Fidelize{% endblock %}

{% block conteudo %}
<div class="form-wrap">
    <div class="form-card">
        <h1>Criar minha conta</h1>
        <p class="sub">Leva menos de um minuto. Sem cartão de crédito.</p>

        {% if erro %}
            <div class="flash flash-error">{{ erro }}</div>
        {% endif %}

        <form method="POST" action="/cadastro">
            <div class="form-field">
                <label for="nome_negocio">Nome do negócio</label>
                <input class="form-input" type="text" id="nome_negocio" name="nome_negocio" required autocomplete="organization">
            </div>
            <div class="form-field">
                <label for="email">E-mail</label>
                <input class="form-input" type="email" id="email" name="email" required autocomplete="email">
            </div>
            <div class="form-field">
                <label for="senha">Senha</label>
                <input class="form-input" type="password" id="senha" name="senha" required autocomplete="new-password" minlength="6">
            </div>
            <button class="btn-form" type="submit">Criar minha conta grátis</button>
        </form>

        <div class="form-footer-link">
            Já tem conta? <a href="/login">Entrar</a>
        </div>
    </div>
</div>
{% endblock %}
